<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dinosaurios con Texto</title>
    <style>
        body {
            background-color: #111;
            color: #00ff88;
            font-family: "Courier New", monospace;
            text-align: center;
        }
        .dino {
            white-space: pre;
            font-size: 14px;
            margin: 30px;
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            display: inline-block;
        }
        h1 {
            color: #00ffcc;
        }
    </style>
</head>
<body>

<h1>Dinosaurios en ASCII 🦖</h1>

 /_/ \_\
</div>

<div class="dino">
     /\
    /**\ 
   /****\ 
  /******\ 
 /********\ 
/**********\
    ||||
    ||||   Braquiosaurio
</div>

<div class="dino">
   __
  / _)
 / /  
/ /   ___
\ \__/ @ \
 \______/   Velociraptor

<div class="dino">
  ^  ^

</body>
</html>
